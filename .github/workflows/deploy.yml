name: Deploy crm-lms-backend
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy over SSH and run Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            PROJECT_DIR="/root/crm-lms-backend"
            
            # 1. Papka mavjudligini tekshirish
            if [ ! -d "$PROJECT_DIR" ]; then
              echo "Project directory not found. Cloning..."
              git clone https://github.com/soatmurotov1/crm-lms-backend.git "$PROJECT_DIR"
            fi

            cd "$PROJECT_DIR"

            # 2. Konfliktlarni oldini olish uchun "Hard Reset"
            echo "Cleaning up local changes and pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            # 3. .env fayli yo'q bo'lsa, xato bermasligi uchun yaratib qo'yish
            # Eslatma: Haqiqiy ma'lumotlarni serverda qo'lda nano .env qilib yozishingiz kerak
            if [ ! -f .env ]; then
              echo "Creating temporary .env file..."
              touch .env
            fi

            # 4. Docker tizimini tozalash (eski keraksiz qatlamlarni o'chirish)
            echo "Cleaning up old docker images..."
            docker image prune -f

            # 5. Konteynerlarni qayta qurish va ishga tushirish
            echo "Stopping old containers and starting new ones..."
            docker compose down --remove-orphans
            docker compose up -d --build

            echo "Deployment finished successfully!"